# Default configuration: full loop, Lichess deployment enabled.

[loop]
iterations = 0
samples_per_iter = 6000
temperature_moves = 30

[selfplay]
games = 100
simulations = 200
dirichlet_alpha = 0.3
dirichlet_epsilon = 0.25

[train]
batch_size = 256
learning_rate = 1e-3
weight_decay = 1e-4
epochs_per_iter = 10
buffer_iterations = 4

[arena]
games = 100
simulations = 400
promotion_threshold = 0.55

[coach]
provider = "grok"
model = "grok-4"
api_key = "env:XAI_API_KEY"

[lichess]
enabled = true
token = "env:LICHESS_TOKEN"
account = "magnusgrok"
